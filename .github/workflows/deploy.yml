name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - prod

jobs:
  resolve-environment:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env_name }}
      public_url: ${{ steps.setenv.outputs.public_url }}
    steps:
      - id: setenv
        run: |
          TARGET="${{ github.event.inputs.environment }}"

          if [ -z "$TARGET" ]; then
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TARGET="prod"
            else
              TARGET="staging"
            fi
          fi

          if [ "$TARGET" = "prod" ]; then
            echo "env_name=Production" >> $GITHUB_OUTPUT
            echo "public_url=https://carvipix.com" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "public_url=https://carvipix.com" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.env_name }}
    permissions:
      contents: read
      statuses: read

    steps:
      - name: Inspect Vercel deployment status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          python <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repository = os.environ["REPOSITORY"]
          sha = os.environ["COMMIT_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          url = f"https://api.github.com/repos/{repository}/commits/{sha}/status"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "copilot-deploy-check",
          }

          request = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)

          statuses = payload.get("statuses", [])
          vercel_statuses = [item for item in statuses if item.get("context") == "Vercel"]
          if not vercel_statuses:
              print("No Vercel commit status found for this SHA. Continuing with direct production validation.")
              sys.exit(0)

          current = vercel_statuses[0]
          state = current.get("state")
          target_url = current.get("target_url") or ""
          description = current.get("description") or ""
          print(f"Vercel status: {state} | {description}")
          if target_url:
              print(f"Vercel deployment: {target_url}")

          if state in {"failure", "error"}:
              print("::error title=Vercel deployment failed::Vercel marked this commit deployment as failed")
              sys.exit(1)

          if state == "pending":
              print("Vercel still reports this commit as pending. Final decision will be based on live production validation.")

          sys.exit(0)
          PY

      - name: Verify production health
        env:
          PUBLIC_URL: ${{ needs.resolve-environment.outputs.public_url }}
        run: |
          set -e
          curl -fsS -I "$PUBLIC_URL" > /dev/null
          echo "Production endpoint reachable: $PUBLIC_URL"
