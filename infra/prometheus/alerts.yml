groups:
  - name: carvipix-alerts
    rules:
      - alert: AppHealthEndpointDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CARVIPIX app health endpoint is down"
          description: "The health probe to /api/health has failed for 2 minutes."

      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High host CPU detected"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: ContainerRestartSpike
        expr: increase(container_start_time_seconds[15m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container restarts detected"
          description: "More than 3 container restarts in 15 minutes."
