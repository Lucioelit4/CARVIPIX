name: carvipix-prod

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/your-org/carvipix:latest}
    container_name: carvipix-app-prod
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NEXT_PUBLIC_APP_ENV: production
      INTERNAL_OBSERVER_TOKEN: ${INTERNAL_OBSERVER_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      COMMUNITY_TEXT_MODEL: ${COMMUNITY_TEXT_MODEL:-}
      COMMUNITY_IMAGE_MODEL: ${COMMUNITY_IMAGE_MODEL:-gpt-image-1}
      COMMUNITY_INTELLIGENCE_ENABLED: ${COMMUNITY_INTELLIGENCE_ENABLED:-false}
      COMMUNITY_INTELLIGENCE_TEST_ONLY: ${COMMUNITY_INTELLIGENCE_TEST_ONLY:-true}
      COMMUNITY_INTELLIGENCE_OFFICIAL_ENABLED: ${COMMUNITY_INTELLIGENCE_OFFICIAL_ENABLED:-false}
      COMMUNITY_TELEGRAM_BOT_TOKEN: ${COMMUNITY_TELEGRAM_BOT_TOKEN:-}
      COMMUNITY_TELEGRAM_CHANNEL_TEST: ${COMMUNITY_TELEGRAM_CHANNEL_TEST:-}
      COMMUNITY_TELEGRAM_CHANNEL_OFFICIAL: ${COMMUNITY_TELEGRAM_CHANNEL_OFFICIAL:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  community-worker:
    image: alpine:3.21
    container_name: carvipix-community-worker-prod
    environment:
      INTERNAL_OBSERVER_TOKEN: ${INTERNAL_OBSERVER_TOKEN}
      COMMUNITY_WORKER_INTERVAL_SECONDS: ${COMMUNITY_WORKER_INTERVAL_SECONDS:-300}
    command:
      - /bin/sh
      - -c
      - >-
        while true; do
          wget -q -O /dev/null --header="x-internal-token: $${INTERNAL_OBSERVER_TOKEN}"
          --post-data="" http://app:3000/api/internal/community-intelligence/run || true;
          sleep "$${COMMUNITY_WORKER_INTERVAL_SECONDS}";
        done
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: carvipix-nginx-prod
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: carvipix-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: carvipix-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:17
    container_name: carvipix-postgres-backup-prod
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "0 */2 * * *"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 12
      BACKUP_KEEP_MONTHS: 12
      HEALTHCHECK_PORT: 8080
    volumes:
      - backups_prod:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: carvipix-prometheus-prod
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data_prod:/prometheus
    restart: unless-stopped

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: carvipix-blackbox-prod
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    container_name: carvipix-loki-prod
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data_prod:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    container_name: carvipix-promtail-prod
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: carvipix-grafana-prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:
  backups_prod:
  prometheus_data_prod:
  grafana_data_prod:
  loki_data_prod:
